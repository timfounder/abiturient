<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abituriyent Anketasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Стилизация под iOS и Telegram */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color, #f2f2f7);
            color: var(--tg-theme-text-color, #000000);
            margin: 0; padding: 16px; box-sizing: border-box;
        }
        .section {
            background-color: var(--tg-theme-bg-color, #ffffff);
            border-radius: 12px; padding: 16px; margin-bottom: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .form-group { margin-bottom: 16px; }
        .form-group:last-child { margin-bottom: 0; }
        label {
            display: block; font-size: 14px; font-weight: 500;
            margin-bottom: 8px; color: var(--tg-theme-hint-color, #8e8e93);
        }
        input, select {
            width: 100%; padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #c6c6c8);
            border-radius: 8px; font-size: 16px;
            background-color: transparent;
            color: var(--tg-theme-text-color, #000000);
            box-sizing: border-box; -webkit-appearance: none;
        }
        input:focus, select:focus { outline: none; border-color: #007aff; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="section">
        <div class="form-group">
            <label>To’liq Ism va Familiyangizni kiriting</label>
            <input type="text" id="fullName" placeholder="Masalan: Alisher Navoiy">
        </div>
        <div class="form-group">
            <label>Tug’ilgan kuningiz</label>
            <input type="date" id="dob">
        </div>
        <div class="form-group">
            <label>Telefon raqamingiz</label>
            <input type="tel" id="phone" placeholder="+998 90 123 45 67">
        </div>
    </div>

    <div class="section">
        <div class="form-group">
            <label>Qayerda o’qiysiz?</label>
            <select id="currentStudy">
                <option value="Maktabda">Maktabda</option>
                <option value="Maktabni bitirganman">Maktabni bitirganman</option>
                <option value="Universitetda">Universitetda</option>
                <option value="Universitetni bitirganman">Universitetni bitirganman</option>
            </select>
        </div>
        <div class="form-group">
            <label>Qaysi darajaga topshirmoqchisiz?</label>
            <select id="desiredLevel">
                <option value="Bachelor">Bachelor</option>
                <option value="Master">Master</option>
            </select>
        </div>
        <div class="form-group">
            <label>Ingliz tili sertifikatingiz</label>
            <select id="certType" onchange="toggleScoreInput()">
                <option value="None">None</option>
                <option value="Ielts">IELTS</option>
                <option value="Toefl">TOEFL</option>
            </select>
        </div>
        <div class="form-group hidden" id="scoreGroup">
            <label id="scoreLabel">Balingiz nechi?</label>
            <input type="number" id="certScore" step="0.5" placeholder="Masalan: 6.5">
        </div>
    </div>

    <div class="section">
        <div class="form-group">
            <label>O’qimoqchi bo’lgan sohangiz</label>
            <input type="text" id="fieldOfStudy" placeholder="IT, Biznes, Tibbiyot...">
        </div>
        <div class="form-group">
            <label>Qaysi davlatga topshirmoqchisiz?</label>
            <select id="country">
                <option value="Italiya">Italiya</option>
                <option value="Germaniya">Germaniya</option>
            </select>
        </div>
        <div class="form-group">
            <label>Qaysi bosqichga topshirmoqchi ekanligingiz</label>
            <select id="finalStage">
                <option value="Foundation">Foundation</option>
                <option value="Bachelors">Bachelors</option>
                <option value="Masters">Masters</option>
            </select>
        </div>
    </div>

    <script>
        // === НАСТРОЙКИ БОТА ===
        const BOT_TOKEN = "8444462509:AAEHhQRzXP1UG9KekXH-nTtLT5VLO0Vs084"; 
        const ADMIN_ID = "6042618441"; // Вставь сюда свой ID из @userinfobot

        const tg = window.Telegram.WebApp;
        tg.expand();
        
        tg.MainButton.text = "Yuborish";
        tg.MainButton.color = tg.themeParams.button_color || "#007aff";
        tg.MainButton.textColor = tg.themeParams.button_text_color || "#ffffff";
        tg.MainButton.show();

        function toggleScoreInput() {
            const certType = document.getElementById("certType").value;
            const scoreGroup = document.getElementById("scoreGroup");
            if (certType === "None") {
                scoreGroup.classList.add("hidden");
                document.getElementById("certScore").value = "";
            } else {
                scoreGroup.classList.remove("hidden");
                document.getElementById("scoreLabel").innerText = `${certType} balingiz nechi?`;
            }
        }

        tg.MainButton.onClick(async () => {
            const data = {
                fullName: document.getElementById("fullName").value,
                dob: document.getElementById("dob").value,
                phone: document.getElementById("phone").value,
                currentStudy: document.getElementById("currentStudy").value,
                desiredLevel: document.getElementById("desiredLevel").value,
                certType: document.getElementById("certType").value,
                certScore: document.getElementById("certScore").value || "Yo'q",
                fieldOfStudy: document.getElementById("fieldOfStudy").value,
                country: document.getElementById("country").value,
                finalStage: document.getElementById("finalStage").value
            };

            if (!data.fullName || !data.phone) {
                tg.showAlert("Iltimos, ism va telefon raqamingizni kiriting!");
                return;
            }

            // Меняем текст кнопки на процесс загрузки
            tg.MainButton.text = "Yuborilmoqda...";
            tg.MainButton.showProgress(true);

            // Текст для админа
            const adminText = `<b>🔥 Yangi Anketa!</b>\n\n👤 <b>Ism:</b> ${data.fullName}\n📅 <b>Tug'ilgan sana:</b> ${data.dob}\n📞 <b>Telefon:</b> ${data.phone}\n🏫 <b>Hozirgi holat:</b> ${data.currentStudy}\n🎓 <b>Daraja:</b> ${data.desiredLevel}\n📜 <b>Sertifikat:</b> ${data.certType} (${data.certScore})\n📚 <b>Soha:</b> ${data.fieldOfStudy}\n🌍 <b>Davlat:</b> ${data.country}\n🎯 <b>Yakuniy:</b> ${data.finalStage}`;

            // Отправляем данные тебе (админу) напрямую через API Telegram
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: ADMIN_ID,
                    text: adminText,
                    parse_mode: "HTML"
                })
            });

            // Определяем видео для ученика
            let videoText = "";
            if (data.finalStage === "Foundation") videoText = "Foundation dasturi haqida video: https://youtube.com/...";
            else if (data.finalStage === "Bachelors") videoText = "Bakalavriat dasturi haqida video: https://youtube.com/...";
            else videoText = "Magistratura dasturi haqida video: https://youtube.com/...";

            const userText = `Ajoyib, ${data.fullName}! Arizangiz qabul qilindi ✅\n\n${videoText}\n\nIelts/Toefl sertifikatingizni adminga yuborsangiz, jarayonni tezroq boshlaymiz!`;

            // Отправляем сообщение юзеру (от лица бота)
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: tg.initDataUnsafe.user.id, // ID ученика берем автоматически
                    text: userText
                })
            });

            tg.MainButton.hideProgress();
            tg.showAlert("Arizangiz muvaffaqiyatli yuborildi!", () => {
                tg.close(); // Закрываем Mini App
            });
        });
    </script>
</body>
</html>

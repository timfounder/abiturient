<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abituriyent Anketasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-secondary-bg-color: #f2f2f7;
            --tg-theme-text-color: #000000;
            --tg-theme-hint-color: #8e8e93;
            --tg-theme-button-color: #007aff;
            --border-radius: 16px;
        }
        body { font-family: -apple-system, sans-serif; background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); margin: 0; padding: 20px; }
        .card { background: var(--tg-theme-bg-color); border-radius: var(--border-radius); padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--tg-theme-hint-color); margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); font-size: 16px; box-sizing: border-box; }
        .hidden { display: none; }
        h2 { font-size: 18px; margin: 10px 0; }
    </style>
</head>
<body>

    <h2>Shaxsiy ma'lumotlar 👤</h2>
    <div class="card">
        <div class="form-group"><label>To’liq Ism и Familiya 📝</label><input type="text" id="fullName" placeholder="Muhammadxuja Eshnazarov"></div>
        <div class="form-group"><label>Tug’ilgan sana 📅</label><input type="date" id="dob"></div>
        <div class="form-group"><label>Telefon raqam 📱</label><input type="tel" id="phone" placeholder="+998 (00) 000-00-00"></div>
    </div>

    <h2>Ta'lim 📚</h2>
    <div class="card">
        <div class="form-group">
            <label>Hozirgi holatingiz 🏫</label>
            <select id="currentStudy">
                <option value="Maktab/College">Maktab/College o’quvchisi</option>
                <option value="Gap year">Gap year / Bitirganman</option>
                <option value="Talaba">Universitet talabasi</option>
            </select>
        </div>
        <div class="form-group">
            <label>Sertifikat 📜</label>
            <select id="certType" onchange="toggleScore()">
                <option value="None">Mavjud emas</option>
                <option value="Ielts">IELTS</option>
                <option value="Toefl">TOEFL</option>
            </select>
        </div>
        <div id="scoreGroup" class="hidden">
            <label>Ball 🎯</label><input type="number" id="certScore" placeholder="7.0">
        </div>
    </div>

    <h2>Yo'nalish 🌍</h2>
    <div class="card">
        <div class="form-group"><label>Soha 💼</label><input type="text" id="fieldOfStudy" placeholder="Law"></div>
        <div class="form-group">
            <label>Davlat ✈️</label>
            <select id="country">
                <option value="Italiya">Italiya</option>
                <option value="Germaniya">Germaniya</option>
            </select>
        </div>
        <div class="form-group">
            <label>Topshiriladigan daraja 🎓</label>
            <select id="finalStage">
                <option value="Foundation">Foundation</option>
                <option value="Bachelors">Bachelors</option>
                <option value="Masters">Masters</option>
            </select>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const BOT_TOKEN = "8444462509:AAEHhQRzXP1UG9KekXH-nTtLT5VLO0Vs084";
        const ADMIN_ID = "6042618441";

        tg.ready(); tg.expand();
        tg.MainButton.text = "YUBORISH";
        tg.MainButton.show();

        function toggleScore() {
            const val = document.getElementById("certType").value;
            document.getElementById("scoreGroup").classList.toggle("hidden", val === "None");
        }

        tg.MainButton.onClick(async () => {
            tg.MainButton.showProgress();

            // Сбор всех данных
            const data = {
                name: document.getElementById("fullName").value,
                dob: document.getElementById("dob").value,
                phone: document.getElementById("phone").value,
                status: document.getElementById("currentStudy").value,
                cert: document.getElementById("certType").value,
                score: document.getElementById("certScore").value || "N/A",
                field: document.getElementById("fieldOfStudy").value,
                country: document.getElementById("country").value,
                level: document.getElementById("finalStage").value
            };

            // Полный текст сообщения со всеми полями
            const fullMsg = `<b>🔥 YANGI ARIZA!</b>\n\n` +
                           `👤 <b>Ism:</b> ${data.name}\n` +
                           `📅 <b>Tug'ilgan sana:</b> ${data.dob}\n` +
                           `📞 <b>Telefon:</b> ${data.phone}\n` +
                           `🏫 <b>Hozirgi holat:</b> ${data.status}\n` +
                           `📜 <b>Sertifikat:</b> ${data.cert} (${data.score})\n` +
                           `📚 <b>Soha:</b> ${data.field}\n` +
                           `🌍 <b>Davlat:</b> ${data.country}\n` +
                           `🎓 <b>Daraja:</b> ${data.level}`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: ADMIN_ID, text: fullMsg, parse_mode: 'HTML' })
                });
                tg.close();
            } catch (e) {
                tg.hideProgress();
                tg.showAlert("Xato yuz berdi!");
            }
        });
    </script>
</body>
</html>

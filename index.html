<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abituriyent Anketasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-secondary-bg-color: #f2f2f7;
            --tg-theme-text-color: #000000;
            --tg-theme-hint-color: #8e8e93;
            --tg-theme-button-color: #007aff;
            --border-radius: 16px;
        }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0; padding: 20px;
            min-height: 100vh;
        }
        .progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 5px; background: rgba(0,0,0,0.05); z-index: 1000; }
        .progress-bar { height: 100%; width: 0%; background: var(--tg-theme-button-color); transition: width 0.4s; }
        h2 { font-size: 18px; margin: 20px 0 10px 5px; }
        .card { background: var(--tg-theme-bg-color); border-radius: var(--border-radius); padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--tg-theme-hint-color); margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); font-size: 16px; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

    <h2>Shaxsiy ma'lumotlar 👤</h2>
    <div class="card">
        <div class="form-group">
            <label>To’liq Ism va Familiya 📝</label>
            <input type="text" id="fullName" placeholder="Alisher Navoiy">
        </div>
        <div class="form-group">
            <label>Tug’ilgan sana 📅</label>
            <input type="date" id="dob">
        </div>
        <div class="form-group">
            <label>Telefon raqam 📱</label>
            <input type="tel" id="phone" placeholder="+998 (__) ___-__-__">
        </div>
    </div>

    <h2>Ta'lim va Sertifikatlar 📚</h2>
    <div class="card">
        <div class="form-group">
            <label>Hozirgi holatingiz 🏫</label>
            <select id="currentStudy">
                <option value="" disabled selected>Tanlang...</option>
                <option value="Maktab/College o’quvchisi">Maktab/College o’quvchisi</option>
                <option value="Maktab/Collegeni bitirganman">Maktab/Collegeni bitirganman / Gap year</option>
                <option value="Universitet talabasi">Universitet talabasi</option>
                <option value="Universitetni bitirganman">Universitetni bitirganman</option>
            </select>
        </div>
        <div class="form-group">
            <label>Sertifikat 📜</label>
            <select id="certType" onchange="toggleScoreInput()">
                <option value="" disabled selected>Tanlang...</option>
                <option value="None">Mavjud emas</option>
                <option value="Ielts">IELTS</option>
                <option value="Toefl">TOEFL</option>
            </select>
        </div>
        <div class="form-group hidden" id="scoreGroup">
            <label id="scoreLabel">Ball 🎯</label>
            <input type="number" id="certScore" step="0.5" placeholder="6.5">
        </div>
    </div>

    <h2>Yo'nalish va Davlat 🌍</h2>
    <div class="card">
        <div class="form-group">
            <label>Soha 💼</label>
            <input type="text" id="fieldOfStudy" placeholder="IT, Biznes...">
        </div>
        <div class="form-group">
            <label>Davlat ✈️</label>
            <select id="country">
                <option value="" disabled selected>Tanlang...</option>
                <option value="Italiya">Italiya</option>
                <option value="Germaniya">Germaniya</option>
            </select>
        </div>
        <div class="form-group">
            <label>Topshiriladigan daraja 🎓</label>
            <select id="finalStage">
                <option value="" disabled selected>Tanlang...</option>
                <option value="Foundation">Foundation</option>
                <option value="Bachelors">Bachelors</option>
                <option value="Masters">Masters</option>
            </select>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const BOT_TOKEN = "8444462509:AAEHhQRzXP1UG9KekXH-nTtLT5VLO0Vs084";
        const ADMIN_ID = "6042618441";

        tg.ready();
        tg.expand();
        tg.MainButton.text = "Yuborish";
        tg.MainButton.show();

        function updateProgress() {
            const fields = ['fullName', 'dob', 'phone', 'currentStudy', 'certType', 'fieldOfStudy', 'country', 'finalStage'];
            let filled = 0;
            fields.forEach(id => {
                const el = document.getElementById(id);
                if (el && el.value && el.value.trim() !== "") filled++;
            });
            document.getElementById('progressBar').style.width = (filled / fields.length * 100) + "%";
        }

        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('change', updateProgress);
            el.addEventListener('input', updateProgress);
        });

        function toggleScoreInput() {
            const cert = document.getElementById("certType").value;
            const scoreGroup = document.getElementById("scoreGroup");
            if (cert === "Ielts" || cert === "Toefl") {
                scoreGroup.classList.remove("hidden");
            } else {
                scoreGroup.classList.add("hidden");
            }
            updateProgress();
        }

        tg.MainButton.onClick(async () => {
            tg.MainButton.showProgress();
            const data = {
                name: document.getElementById("fullName").value,
                phone: document.getElementById("phone").value,
                study: document.getElementById("currentStudy").value,
                country: document.getElementById("country").value,
                level: document.getElementById("finalStage").value
            };

            if (!data.name || !data.phone || !data.study || !data.country || !data.level) {
                tg.hideProgress();
                tg.showAlert("Iltimos, barcha maydonlarni to'ldiring!");
                return;
            }

            const msg = `<b>🚀 Yangi Ariza!</b>\n\n👤 <b>F.I.O:</b> ${data.name}\n📞 <b>Tel:</b> ${data.phone}\n🌍 <b>Davlat:</b> ${data.country}\n🎓 <b>Daraja:</b> ${data.level}`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: ADMIN_ID, text: msg, parse_mode: 'HTML' })
                });
                tg.showAlert("Yuborildi! ✅");
                tg.close();
            } catch (e) {
                tg.hideProgress();
                tg.showAlert("Xato yuz berdi!");
            }
        });

        // Маска телефона
        document.getElementById('phone').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,2})(\d{0,3})(\d{0,2})(\d{0,2})/);
            e.target.value = !x[2] ? x[1] : '+' + x[1] + ' (' + x[2] + ') ' + x[3] + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
        });
    </script>
</body>
</html>

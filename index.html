<script>
        const tg = window.Telegram.WebApp;
        const BOT_TOKEN = "8444462509:AAEHhQRzXP1UG9KekXH-nTtLT5VLO0Vs084";
        const ADMIN_ID = "6042618441";
        const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbzPq-j41Ijov8dzG_9N6RHVo6OSL9mB3290T7qgPk42aLwbChY8I6SIITlxaccl0KmE_w/exec"; 

        tg.ready();
        tg.expand();
        
        tg.MainButton.text = "Yuborish";
        tg.MainButton.show();

        // Функция обновления прогресс-бара
        function updateProgress() {
            const fields = ['fullName', 'dob', 'phone', 'currentStudy', 'certType', 'fieldOfStudy', 'country', 'finalStage'];
            let filled = 0;
            let total = fields.length;

            fields.forEach(id => {
                const val = document.getElementById(id).value;
                if (id === 'phone') {
                    if (val.length >= 19) filled++;
                } else if (val && val.trim() !== '') {
                    filled++;
                }
            });

            const certType = document.getElementById('certType').value;
            if (certType === 'Ielts' || certType === 'Toefl') {
                total++; 
                const score = document.getElementById('certScore').value;
                if (score && score.trim() !== '') filled++;
            }

            document.getElementById('progressBar').style.width = Math.round((filled / total) * 100) + '%';
        }

        // Слушатели изменений
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', updateProgress);
            el.addEventListener('change', updateProgress);
        });

        // Маска для телефона
        const phoneInput = document.getElementById('phone');
        phoneInput.value = "+998 "; 
        phoneInput.addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '');
            if (!x.startsWith('998')) x = '998' + x;
            let match = x.match(/(\d{3})(\d{0,2})(\d{0,3})(\d{0,2})(\d{0,2})/);
            if (!match) return;
            e.target.value = '+' + match[1] + (match[2] ? ' (' + match[2] : '') + (match[3] ? ') ' + match[3] : '') + (match[4] ? '-' + match[4] : '') + (match[5] ? '-' + match[5] : '');
            updateProgress();
        });

        function toggleScoreInput() {
            const certType = document.getElementById("certType").value;
            const scoreGroup = document.getElementById("scoreGroup");
            if (certType === "None" || certType === "") {
                scoreGroup.classList.add("hidden");
                document.getElementById("certScore").value = "";
            } else {
                scoreGroup.classList.remove("hidden");
                document.getElementById("scoreLabel").innerText = `${certType} balingiz nechi? 🎯`;
            }
            updateProgress();
        }

        // ГЛАВНАЯ ФУНКЦИЯ ОТПРАВКИ
        tg.MainButton.onClick(async () => {
            tg.MainButton.showProgress(); // Показываем анимацию загрузки

            const data = {
                fullName: document.getElementById("fullName").value,
                dob: document.getElementById("dob").value || "-",
                phone: document.getElementById("phone").value,
                currentStudy: document.getElementById("currentStudy").value,
                certType: document.getElementById("certType").value,
                certScore: document.getElementById("certScore").value || "Yo'q",
                fieldOfStudy: document.getElementById("fieldOfStudy").value || "-",
                country: document.getElementById("country").value,
                finalStage: document.getElementById("finalStage").value
            };

            // Проверка полей
            if (!data.fullName || data.phone.length < 19 || !data.currentStudy || !data.country || !data.finalStage) { 
                tg.hideProgress();
                tg.showAlert("Iltimos, barcha asosiy maydonlarni to'ldiring!");
                return;
            }

            // Формируем текст сообщения для тебя
            const message = `<b>🚀 Yangi Ariza!</b>\n\n` +
                          `👤 <b>F.I.O:</b> ${data.fullName}\n` +
                          `📅 <b>Sana:</b> ${data.dob}\n` +
                          `📞 <b>Tel:</b> ${data.phone}\n` +
                          `🏫 <b>Holati:</b> ${data.currentStudy}\n` +
                          `📜 <b>Sertifikat:</b> ${data.certType} (${data.certScore})\n` +
                          `💼 <b>Soha:</b> ${data.fieldOfStudy}\n` +
                          `🌍 <b>Davlat:</b> ${data.country}\n` +
                          `🎓 <b>Daraja:</b> ${data.finalStage}`;

            try {
                // 1. Отправка в Telegram тебе лично
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });

                // 2. Отправка в Google Sheets (в фоне)
                fetch(GOOGLE_SHEETS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                tg.showAlert("Ma'lumotlaringiz yuborildi! ✅");
                tg.close(); // Закрываем приложение

            } catch (error) {
                tg.hideProgress();
                tg.showAlert("Xatolik yuz berdi. Internetni tekshiring!");
            }
        });
        
        setTimeout(updateProgress, 500);
    </script>

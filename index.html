<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abituriyent Anketasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- CSS Переменные и Базовые стили --- */
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-secondary-bg-color: #f2f2f7;
            --tg-theme-text-color: #000000;
            --tg-theme-hint-color: #8e8e93;
            --tg-theme-button-color: #007aff;
            --tg-theme-button-text-color: #ffffff;
            
            --border-radius: 16px;
            --input-bg: var(--tg-theme-secondary-bg-color);
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-image: linear-gradient(to bottom, var(--tg-theme-secondary-bg-color), var(--tg-theme-bg-color));
            min-height: 100vh;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            margin: 24px 0 12px 4px;
            color: var(--tg-theme-text-color);
        }
        h2:first-child { margin-top: 0; }

        /* --- Карточки --- */
        .card {
            background-color: var(--tg-theme-bg-color);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 20px; }
        .form-group:last-child { margin-bottom: 0; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: var(--tg-theme-hint-color);
            margin-left: 4px;
        }

        /* --- Инпуты и Селекты --- */
        input, select {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            background-color: var(--input-bg);
            color: var(--tg-theme-text-color);
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            background-color: var(--tg-theme-bg-color);
            box-shadow: 0 0 0 2px var(--tg-theme-button-color);
        }

        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 20px;
            padding-right: 40px;
        }

        input[type="date"] { min-height: 54px; }

        /* --- Анимации --- */
        .hidden { display: none; }
    </style>
</head>
<body>

    <h2>Shaxsiy ma'lumotlar</h2>
    <div class="card">
        <div class="form-group">
            <label>To’liq Ism va Familiya</label>
            <input type="text" id="fullName" placeholder="Alisher Navoiy">
        </div>
        <div class="form-group">
            <label>Tug’ilgan sana</label>
            <input type="date" id="dob">
        </div>
        <div class="form-group">
            <label>Telefon raqam</label>
            <input type="tel" id="phone" placeholder="+998 90 123 45 67">
        </div>
    </div>

    <h2>Ta'lim va Sertifikatlar</h2>
    <div class="card">
        <div class="form-group">
            <label>Hozirgi holatingiz</label>
            <select id="currentStudy">
                <option value="Maktabda">Maktab o'quvchisi</option>
                <option value="Maktabni bitirganman">Maktab bitiruvchisi</option>
                <option value="Universitetda">Talaba (Universitet)</option>
                <option value="Universitetni bitirganman">Universitet bitiruvchisi</option>
            </select>
        </div>
        <div class="form-group">
            <label>Topshiriladigan daraja</label>
            <select id="desiredLevel">
                <option value="Bachelor">Bachelor (Bakalavr)</option>
                <option value="Master">Master (Magistr)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Ingliz tili sertifikati</label>
            <select id="certType" onchange="toggleScoreInput()">
                <option value="None">Mavjud emas</option>
                <option value="Ielts">IELTS</option>
                <option value="Toefl">TOEFL</option>
            </select>
        </div>
        <div class="form-group hidden" id="scoreGroup">
            <label id="scoreLabel">Balingiz nechi?</label>
            <input type="number" id="certScore" step="0.5" placeholder="Masalan: 6.5">
        </div>
    </div>

    <h2>Yo'nalish va Davlat</h2>
    <div class="card">
        <div class="form-group">
            <label>Tanlangan soha</label>
            <input type="text" id="fieldOfStudy" placeholder="IT, Biznes, Tibbiyot...">
        </div>
        <div class="form-group">
            <label>Qaysi davlatga?</label>
            <select id="country">
                <option value="Italiya">Italiya</option>
                <option value="Germaniya">Germaniya</option>
            </select>
        </div>
        <div class="form-group">
            <label>Yakuniy bosqich</label>
            <select id="finalStage">
                <option value="Foundation">Foundation</option>
                <option value="Bachelors">Bachelors</option>
                <option value="Masters">Masters</option>
            </select>
        </div>
    </div>

    <script>
        // Твои данные уже здесь
        const BOT_TOKEN = "8444462509:AAEHhQRzXP1UG9KekXH-nTtLT5VLO0Vs084"; 
        const ADMIN_ID = "6042618441"; 

        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Подстройка цветов под тему устройства пользователя
        document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#ffffff');
        document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#f2f2f7');
        document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#000000');
        document.documentElement.style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#8e8e93');
        document.documentElement.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#007aff');

        // Настройка главной кнопки Telegram
        tg.MainButton.text = "Yuborish";
        tg.MainButton.color = tg.themeParams.button_color || "#007aff";
        tg.MainButton.textColor = tg.themeParams.button_text_color || "#ffffff";
        tg.MainButton.show();

        // Функция показа/скрытия балла
        function toggleScoreInput() {
            const certType = document.getElementById("certType").value;
            const scoreGroup = document.getElementById("scoreGroup");
            if (certType === "None") {
                scoreGroup.classList.add("hidden");
                document.getElementById("certScore").value = "";
            } else {
                scoreGroup.classList.remove("hidden");
                document.getElementById("scoreLabel").innerText = `${certType} balingiz nechi?`;
            }
        }

        // Обработка клика по кнопке
        tg.MainButton.onClick(async () => {
            const data = {
                fullName: document.getElementById("fullName").value,
                dob: document.getElementById("dob").value,
                phone: document.getElementById("phone").value,
                currentStudy: document.getElementById("currentStudy").value,
                desiredLevel: document.getElementById("desiredLevel").value,
                certType: document.getElementById("certType").value,
                certScore: document.getElementById("certScore").value || "Yo'q",
                fieldOfStudy: document.getElementById("fieldOfStudy").value,
                country: document.getElementById("country").value,
                finalStage: document.getElementById("finalStage").value
            };

            // Проверка обязательных полей
            if (!data.fullName || !data.phone) {
                tg.showAlert("Iltimos, ism va telefon raqamingizni kiriting!");
                return;
            }

            tg.MainButton.text = "Yuborilmoqda...";
            tg.MainButton.showProgress(true);

            // Текст для тебя (админа)
            const adminText = `<b>🔥 Yangi Anketa!</b>\n\n👤 <b>Ism:</b> ${data.fullName}\n📅 <b>Tug'ilgan sana:</b> ${data.dob}\n📞 <b>Telefon:</b> ${data.phone}\n🏫 <b>Hozirgi holat:</b> ${data.currentStudy}\n🎓 <b>Daraja:</b> ${data.desiredLevel}\n📜 <b>Sertifikat:</b> ${data.certType} (${data.certScore})\n📚 <b>Soha:</b> ${data.fieldOfStudy}\n🌍 <b>Davlat:</b> ${data.country}\n🎯 <b>Yakuniy:</b> ${data.finalStage}`;

            try {
                // Отправка данных тебе
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_ID,
                        text: adminText,
                        parse_mode: "HTML"
                    })
                });

                // Видео в зависимости от выбора
                let videoText = "";
                if (data.finalStage === "Foundation") videoText = "Foundation dasturi haqida video: https://youtube.com/...";
                else if (data.finalStage === "Bachelors") videoText = "Bakalavriat dasturi haqida video: https://youtube.com/...";
                else videoText = "Magistratura dasturi haqida video: https://youtube.com/...";

                const userText = `Ajoyib, ${data.fullName}! Arizangiz qabul qilindi ✅\n\n${videoText}\n\nIelts/Toefl sertifikatingizni adminga yuborsangiz, jarayonni tezroq boshlaymiz!`;

                // Отправка сообщения ученику (если он открыл Mini App из Telegram, его ID будет доступен)
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: tg.initDataUnsafe.user.id,
                            text: userText
                        })
                    });
                }

                tg.MainButton.hideProgress();
                tg.showAlert("Arizangiz muvaffaqiyatli yuborildi!", () => {
                    tg.close();
                });
            } catch (error) {
                tg.MainButton.hideProgress();
                tg.showAlert("Xatolik yuz berdi. Iltimos qaytadan urinib ko'ring.");
                tg.MainButton.text = "Yuborish";
            }
        });
    </script>
</body>
</html>
